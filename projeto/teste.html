<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Conversa com Emicida</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .chat-wrapper {
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
        }
        
        .header {
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(139, 69, 19, 0.3) 0%, rgba(218, 165, 32, 0.2) 100%);
            border-bottom: 1px solid rgba(218, 165, 32, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #f0e68c;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 span {
            font-size: 1.8rem;
        }
        
        .header p {
            opacity: 0.7;
            font-size: 0.85rem;
            margin-top: 5px;
            color: #ccc;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            animation: messageIn 0.3s ease;
            position: relative;
        }
        
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #2d5a3e 0%, #1e3d2a 100%);
            border: 1px solid rgba(74, 124, 89, 0.5);
            border-bottom-right-radius: 4px;
        }
        
        .emicida-message {
            align-self: flex-start;
            background: linear-gradient(135deg, #3d2a2a 0%, #2a1a1a 100%);
            border: 1px solid rgba(139, 69, 19, 0.4);
            border-bottom-left-radius: 4px;
        }
        
        .message-label {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .message-content {
            line-height: 1.6;
            font-size: 1rem;
        }
        
        .message-content p {
            margin-bottom: 8px;
        }
        
        .message-content p:last-child {
            margin-bottom: 0;
        }
        
        .input-area {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .textarea-container {
            flex: 1;
            position: relative;
        }
        
        #userInput {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            min-height: 56px;
            max-height: 150px;
            transition: all 0.3s ease;
        }
        
        #userInput:focus {
            outline: none;
            border-color: rgba(218, 165, 32, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(218, 165, 32, 0.1);
        }
        
        #userInput::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        #sendBtn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f0e68c 0%, #daa520 100%);
            border: none;
            color: #1a1a2e;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #sendBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 25px rgba(240, 230, 140, 0.4);
        }
        
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 15px 20px;
            background: rgba(61, 42, 42, 0.8);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #daa520;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            font-size: 0.75rem;
            opacity: 0.5;
            color: #888;
        }
        
        .memory-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .memory-dot {
            width: 6px;
            height: 6px;
            background: #4CAF50;
            border-radius: 50%;
        }
        
        .clear-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            transition: opacity 0.3s;
            z-index: 100;
        }
        
        .back-link:hover {
            opacity: 1;
        }
        
        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            color: #ff6b6b;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Voltar</a>
    
    <div class="chat-wrapper">
        <div class="header">
            <h1><span>🗣️</span> Conversa com Emicida</h1>
            <p>Uma experiência de conversa com a essência do Emicida</p>
        </div>
        
        <div class="chat-container" id="chat">
            <!-- Mensagens aparecem aqui -->
        </div>
        
        <div class="status-bar">
            <div class="memory-status">
                <span class="memory-dot"></span>
                <span id="memoryIndicator">Memória: 0 mensagens</span>
            </div>
            <button class="clear-btn" onclick="clearChat()">🗑️ Limpar conversa</button>
        </div>
        
        <div class="input-area">
            <div class="input-wrapper">
                <div class="textarea-container">
                    <textarea 
                        id="userInput" 
                        placeholder="Digite sua mensagem..." 
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                </div>
                <button id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const API_URL = '/api/emicida';
        const MEMORY_KEY = 'emicida_chat_memory';
        
        // ==================== STATE ====================
        let chatHistory = [];
        let isSending = false;
        
        // ==================== DOM ELEMENTS ====================
        const chatEl = document.getElementById('chat');
        const userInputEl = document.getElementById('userInput');
        const sendBtnEl = document.getElementById('sendBtn');
        const memoryIndicatorEl = document.getElementById('memoryIndicator');
        
        // ==================== INICIALIZAÇÃO ====================
        const MENSAGEM_INICIAL = "E aí, tudo bem? Sou o Emicida, vim da zona norte. Tenho uma proposta: vamos construir juntos um personagem pra uma música. Algumas regras: ele tem 19 anos, mora com os responsáveis, não estuda, não trabalha. Mas o personagem é seu — você decide quem ele é. Eu tenho liberdade pra perguntar e construir com você. Sem pressa. Uma pergunta de cada vez. Essa personagem, como ela é?";
        
        function init() {
            loadMemory();
            updateMemoryIndicator();
            
            // Se não tem memória, mostra mensagem inicial uma única vez
            if (chatHistory.length === 0) {
                addMessageToUI('emicida', MENSAGEM_INICIAL);
                chatHistory.push({ role: 'emicida', content: MENSAGEM_INICIAL });
                saveMemory();
            }
            
            userInputEl.focus();
        }
        
        // ==================== MEMORY ====================
        function loadMemory() {
            const saved = localStorage.getItem(MEMORY_KEY);
            if (saved) {
                try {
                    chatHistory = JSON.parse(saved);
                    chatHistory.forEach(msg => {
                        addMessageToUI(msg.role, msg.content, false);
                    });
                } catch (e) {
                    console.error('Erro ao carregar memória:', e);
                    chatHistory = [];
                }
            }
        }
        
        function saveMemory() {
            const toSave = chatHistory.slice(-50);
            localStorage.setItem(MEMORY_KEY, JSON.stringify(toSave));
            updateMemoryIndicator();
        }
        
        function updateMemoryIndicator() {
            memoryIndicatorEl.textContent = `Memória: ${chatHistory.length} mensagens`;
        }
        
        // ==================== UI ====================
        function addMessageToUI(role, content, animate = true) {
            const div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user-message' : 'emicida-message'}`;
            
            const emoji = role === 'user' ? '👤' : '🖖🏿';
            const label = role === 'user' ? 'Você' : 'Emicida';
            
            // Converter quebras de linha
            const formattedContent = content
                .split('\n')
                .map(p => p.trim() ? `<p>${p}</p>` : '')
                .join('');
            
            div.innerHTML = `
                <div class="message-label">${emoji} ${label}</div>
                <div class="message-content">${formattedContent}</div>
            `;
            
            if (!animate) {
                div.style.animation = 'none';
            }
            
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'message emicida-message';
            div.innerHTML = `
                <div class="message-label">🖖🏿 Emicida</div>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        // ==================== INPUT ====================
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }
        
        // ==================== MENSAGEM ====================
        async function sendMessage() {
            const message = userInputEl.value.trim();
            if (!message || isSending) return;
            
            // Reset input
            userInputEl.value = '';
            userInputEl.style.height = 'auto';
            
            // Add to UI
            addMessageToUI('user', message);
            
            // Add to history
            chatHistory.push({ role: 'user', content: message });
            saveMemory();
            
            // Show typing
            isSending = true;
            sendBtnEl.disabled = true;
            showTyping();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        history: chatHistory.slice(-20)
                    })
                });
                
                if (!response.ok) throw new Error('Erro na requisição');
                
                const data = await response.json();
                
                hideTyping();
                addMessageToUI('emicida', data.response);
                chatHistory.push({ role: 'emicida', content: data.response });
                saveMemory();
                
            } catch (error) {
                hideTyping();
                console.error('Erro:', error);
                addMessageToUI('emicida', 'Man, deu um erro aqui. Tenta de novo? 🇧🇷');
            }
            
            isSending = false;
            sendBtnEl.disabled = false;
            userInputEl.focus();
        }
        
        // ==================== LIMPAR ====================
        function clearChat() {
            if (confirm('Limpar toda a conversa? A memória será apagada.')) {
                chatEl.innerHTML = `
                    <div class="message emicida-message">
                        <div class="message-label">🖖🏿 Emicida</div>
                        <div class="message-content">
                            <p>E aí, tudo bem? Sou o Emicida, vim da zona norte. Tenho uma proposta: vamos construir juntos um personagem pra uma música. Algumas regras: ele tem 19 anos, mora com os responsáveis, não estuda, não trabalha. Mas o personagem é seu — você decide quem ele é. Eu tenho liberdade pra perguntar e construir com você. Sem pressa. Uma pergunta de cada vez. Essa personagem, como ela é?</p>
                        </div>
                    </div>
                `;
                localStorage.removeItem(MEMORY_KEY);
                chatHistory = [];
                updateMemoryIndicator();
            }
        }
        
        // ==================== START ====================
        init();
    </script>
</body>
</html>
