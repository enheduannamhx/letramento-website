<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slides 2025 - ENEM por UF</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Anybody', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: #333;
        }
        
        .slide {
            display: none;
            width: 100vw;
            height: 100vh;
            padding: 60px 80px;
            background: #ffffff;
        }
        
        .slide.active {
            display: flex;
        }
        
        /* Left Side - Empty */
        .slide-left {
            width: 40%;
            padding-right: 40px;
        }
        
        .slide-right {
            width: 60%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Chart */
        .chart-wrapper {
            width: 100%;
            max-width: 700px;
            height: 450px;
        }
        
        /* Navigation */
        .nav-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        
        .nav-btn {
            background: #541f7c;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-family: 'Anybody', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: #3d175c;
            transform: translateY(-2px);
        }
        
        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Cards Grid (Initial View) */
        .cards-view {
            display: block;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        h1 {
            font-size: 3rem;
            color: #541f7c;
            margin-bottom: 15px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2rem;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        
        .uf-card {
            background: #f8f8f8;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .uf-card:hover {
            background: #541f7c;
            border-color: #541f7c;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(84, 31, 124, 0.3);
        }
        
        .uf-card h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .uf-card .ranking {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            background: none;
            border: none;
            color: #541f7c;
            font-family: 'Anybody', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }
        
        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Cards View -->
    <div class="container cards-view" id="cardsView">
        <header>
            <h1>🎓 Slides 2025</h1>
            <p class="subtitle">ENEM - Análise por Estado</p>
        </header>
        
        <div class="cards-grid" id="cardsGrid">
            <!-- Cards gerados via JS -->
        </div>
    </div>
    
    <!-- Slide View -->
    <div class="slide" id="slideView">
        <button class="back-btn" onclick="showCards()">← Voltar</button>
        
        <div class="slide-left">
            <!-- Parte esquerda vazia -->
        </div>
        
        <div class="slide-right">
            <div class="chart-wrapper">
                <canvas id="slideChart"></canvas>
            </div>
        </div>
    </div>
    
    <!-- Navigation -->
    <div class="nav-container" id="navContainer" style="display: none;">
        <button class="nav-btn" id="prevBtn" onclick="prevSlide()">← Anterior</button>
        <button class="nav-btn" id="nextBtn" onclick="nextSlide()">Próximo →</button>
    </div>
    
    <script>
        // Dados do ENEM
        const dadosUF = {
            'AC': { nome: 'Acre', dados: [5.1, 4.6, 6.3, 27.2, 55.8], rank: 13 },
            'AL': { nome: 'Alagoas', dados: [5.0, 4.2, 6.0, 33.6, 65.5], rank: 8 },
            'AM': { nome: 'Amazonas', dados: [4.6, 7.3, 6.7, 24.6, 45.0], rank: 19 },
            'AP': { nome: 'Amapá', dados: [5.3, 5.4, 7.3, 31.5, 65.8], rank: 7 },
            'BA': { nome: 'Bahia', dados: [4.1, 3.9, 4.0, 16.2, 58.0], rank: 21 },
            'CE': { nome: 'Ceará', dados: [14.6, 15.5, 19.5, 68.3, 76.4], rank: 1 },
            'DF': { nome: 'Distrito Federal', dados: [10.0, 9.5, 10.7, 40.8, 61.0], rank: 2 },
            'ES': { nome: 'Espírito Santo', dados: [8.3, 8.9, 10.1, 40.8, 61.1], rank: 4 },
            'GO': { nome: 'Goiás', dados: [6.0, 8.0, 9.5, 41.1, 64.3], rank: 3 },
            'MA': { nome: 'Maranhão', dados: [4.6, 4.7, 6.2, 26.8, 48.3], rank: 18 },
            'MG': { nome: 'Minas Gerais', dados: [4.2, 4.8, 5.1, 19.3, 45.2], rank: 24 },
            'MS': { nome: 'Mato Grosso do Sul', dados: [4.9, 5.6, 6.9, 25.6, 47.3], rank: 17 },
            'MT': { nome: 'Mato Grosso', dados: [4.3, 4.2, 5.8, 27.0, 45.0], rank: 20 },
            'PA': { nome: 'Pará', dados: [4.4, 3.7, 5.2, 25.3, 52.9], rank: 16 },
            'PB': { nome: 'Paraíba', dados: [7.1, 6.3, 8.3, 38.6, 68.1], rank: 5 },
            'PE': { nome: 'Pernambuco', dados: [6.5, 7.0, 7.5, 31.3, 60.4], rank: 10 },
            'PI': { nome: 'Piauí', dados: [6.2, 5.8, 7.1, 30.5, 63.1], rank: 9 },
            'PR': { nome: 'Paraná', dados: [4.2, 6.4, 6.6, 28.1, 50.0], rank: 15 },
            'RJ': { nome: 'Rio de Janeiro', dados: [3.9, 4.4, 5.6, 19.9, 40.9], rank: 25 },
            'RN': { nome: 'Rio Grande do Norte', dados: [5.0, 4.8, 7.1, 30.1, 59.3], rank: 12 },
            'RO': { nome: 'Rondônia', dados: [6.1, 6.2, 8.5, 36.1, 55.0], rank: 11 },
            'RR': { nome: 'Roraima', dados: [4.3, 3.5, 3.9, 17.8, 38.1], rank: 26 },
            'RS': { nome: 'Rio Grande do Sul', dados: [5.2, 6.3, 7.0, 27.9, 52.1], rank: 14 },
            'SC': { nome: 'Santa Catarina', dados: [4.2, 5.2, 6.5, 24.8, 38.4], rank: 23 },
            'SE': { nome: 'Sergipe', dados: [6.0, 5.8, 7.5, 30.3, 66.6], rank: 6 },
            'SP': { nome: 'São Paulo', dados: [4.2, 4.3, 5.3, 22.0, 29.3], rank: 27 },
            'TO': { nome: 'Tocantins', dados: [5.0, 5.5, 6.6, 22.1, 46.4], rank: 22 }
        };
        
        const brasil = [5.3, 5.7, 6.8, 27.6, 47.4];
        const anos = [2020, 2021, 2022, 2023, 2024];
        const ufs = Object.keys(dadosUF);
        let currentIndex = 0;
        let chart = null;
        
        // Gerar cards
        function generateCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            const sortedUfs = ufs.sort((a, b) => dadosUF[a].rank - dadosUF[b].rank);
            
            sortedUfs.forEach(uf => {
                const card = document.createElement('div');
                card.className = 'uf-card';
                card.onclick = () => openSlide(uf);
                card.innerHTML = `
                    <h3>${uf}</h3>
                    <p class="ranking">#${dadosUF[uf].rank}</p>
                `;
                grid.appendChild(card);
            });
        }
        
        // Mostrar cards
        function showCards() {
            document.getElementById('cardsView').style.display = 'block';
            document.getElementById('slideView').classList.remove('active');
            document.getElementById('navContainer').style.display = 'none';
        }
        
        // Abrir slide
        function openSlide(uf) {
            currentIndex = ufs.indexOf(uf);
            document.getElementById('cardsView').style.display = 'none';
            document.getElementById('slideView').classList.add('active');
            document.getElementById('navContainer').style.display = 'flex';
            renderSlide();
        }
        
        // Renderizar slide
        function renderSlide() {
            const uf = ufs[currentIndex];
            const dados = dadosUF[uf];
            
            // Botões de navegação
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === ufs.length - 1;
            
            // Destruir chart anterior
            if (chart) {
                chart.destroy();
            }
            
            // Criar novo chart
            const ctx = document.getElementById('slideChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: anos,
                    datasets: [
                        {
                            type: 'line',
                            label: 'Brasil',
                            data: brasil,
                            borderColor: 'transparent',
                            backgroundColor: 'rgba(200, 200, 200, 0.2)',
                            borderWidth: 0,
                            fill: true,
                            tension: 0,
                            pointRadius: 0,
                            order: 2,
                            stepped: true
                        },
                        {
                            label: '%',
                            data: dados.dados,
                            backgroundColor: '#541f7c',
                            borderRadius: 4,
                            borderSkipped: false,
                            barPercentage: 0.9,
                            categoryPercentage: 0.85,
                            order: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            enabled: false
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                font: {
                                    family: 'Anybody',
                                    size: 14
                                },
                                color: '#666'
                            },
                            border: {
                                display: false
                            }
                        },
                        y: {
                            display: false,
                            beginAtZero: true,
                            max: 100
                        }
                    },
                    layout: {
                        padding: {
                            top: 20
                        }
                    }
                },
                plugins: [{
                    id: 'valueLabels',
                    afterDatasetsDraw: function(chart) {
                        const ctx = chart.ctx;
                        ctx.font = 'bold 14px Anybody';
                        ctx.fillStyle = '#333';
                        ctx.textAlign = 'center';
                        
                        chart.data.datasets[1].data.forEach(function(value, index) {
                            const meta = chart.getDatasetMeta(1);
                            const position = meta.data[index].getProps(['x', 'y'], true);
                            ctx.fillText(value + '%', position.x, position.y - 10);
                        });
                    }
                }]
            });
        }
        
        // Navegação
        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide();
            }
        }
        
        function nextSlide() {
            if (currentIndex < ufs.length - 1) {
                currentIndex++;
                renderSlide();
            }
        }
        
        // Inicializar
        generateCards();
        
        // Navegação com teclado
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('slideView').classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevSlide();
                if (e.key === 'ArrowRight') nextSlide();
                if (e.key === 'Escape') showCards();
            }
        });
    </script>
</body>
</html>
